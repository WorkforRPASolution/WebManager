apiVersion: v1
kind: ConfigMap
metadata:
  name: webmanager-config
data:
  PORT: "3000"
  NODE_ENV: "production"
  # MongoDB (headless 서비스 DNS — 실제 서비스명으로 변경 필요)
  MONGODB_URI: "mongodb://mongodb-headless.default.svc.cluster.local:27017/EARS?directConnection=true&authSource=EARS"
  WEBMANAGER_DB_URI: "mongodb://mongodb-headless.default.svc.cluster.local:27017/WEB_MANAGER?directConnection=true&authSource=EARS"
  # CORS (NodePort 외부 접속 주소 — 실제 IP:Port로 변경 필요)
  ALLOWED_ORIGINS: "http://NODE_IP:30080"
  # 보안
  BCRYPT_SALT_ROUNDS: "12"
  JWT_EXPIRES_IN: "24h"
  REFRESH_TOKEN_EXPIRES_IN: "7d"
  # ManagerAgent RPC / FTP
  MANAGER_AGENT_PORT: "7180"
  SOCKS_PROXY_PORT: "30000"
  FTP_PORT: "7181"
  FTP_TIMEOUT: "30000"
  # 이미지 저장소
  IMAGE_STORAGE: "httpwebserver"
  # Redis (실제 주소/마스터명으로 변경 필요)
  # Simple: redis://redis-host:6379/0
  # Sentinel: {sentinel1:26379},{sentinel2:26379},{sentinel3:26379}#masterName
  REDIS_URL: "{redis-sentinel-0:26379},{redis-sentinel-1:26379},{redis-sentinel-2:26379}#mymaster"
