apiVersion: apps/v1
kind: Deployment
metadata:
  name: webmanager
  labels:
    app: webmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webmanager
  template:
    metadata:
      labels:
        app: webmanager
    spec:
      containers:
        - name: webmanager
          image: webmanager:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: webmanager-config
            - secretRef:
                name: webmanager-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
